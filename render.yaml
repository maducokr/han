# Render Blueprint — GitHub maducokr/han
# 백엔드 API: han-xe9x  ·  프론트 정적: han-krslot
services:
  - type: web
    name: han-xe9x
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PI_API_KEY
        sync: false
      - key: PI_WALLET_SEED
        sync: false
      - key: CORS_ORIGINS
        value: https://krslotcaaad0999.pinet.com,https://han-krslot.onrender.com

  - type: web
    name: han-krslot
    runtime: static
    buildCommand: mkdir -p dist && cp index.html index2.html .nojekyll dist/
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
