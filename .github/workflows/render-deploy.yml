# Render 백엔드(han-xe9x) 배포 트리거
# GitHub → Settings → Secrets → RENDER_DEPLOY_HOOK
# (Render Dashboard → han-xe9x → Settings → Deploy Hook URL)
name: Deploy backend to Render

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "render.yaml"
      - ".github/workflows/render-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK secret not set — skip (use Render Dashboard Manual Deploy)"
            exit 0
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK"
          echo "Render deploy triggered"
