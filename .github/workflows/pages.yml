# GitHub Pages — 프론트엔드 (index.html + 법적 문서)
# Settings → Pages → Source: GitHub Actions
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare frontend site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p site/assets
          cp index.html privacy.html terms.html site/
          cp .nojekyll site/ 2>/dev/null || touch site/.nojekyll
          if [ -d assets ]; then
            cp -R assets/. site/assets/
          fi
          shopt -s nullglob
          for f in *.jpg *.jpeg *.png *.webp; do
            cp "$f" site/
          done

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
