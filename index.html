<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>한글 · 섬 슬롯</title>
  <!-- Pi App Studio: 기본 Pi SDK (Pi Browser 저수준 연결) -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script>
    /** pi-sdk 코어: sandbox 감지만 — Pi.init은 PiClient(pi-sdk-js)에서 단일 호출 */
    (function () {
      function detectPiSandbox() {
        var qs = new URLSearchParams(location.search);
        if (qs.has("sandbox")) {
          var v = qs.get("sandbox");
          return v !== "0" && v !== "false";
        }
        var host = location.hostname;
        if (host === "localhost" || host === "127.0.0.1") return true;
        if (host.indexOf("sandbox.minepi.com") !== -1) return true;
        /* PiNet·GitHub Pages = 테스트넷 기본 (메인넷: ?sandbox=0) */
        if (host.endsWith(".pinet.com") || host === "pinet.com") return true;
        if (host === "github.io" || host.slice(-10) === ".github.io") {
          return true;
        }
        try {
          if (document.referrer.indexOf("sandbox.minepi.com") !== -1) return true;
        } catch (_) {}
        return false;
      }
      window.detectPiSandbox = detectPiSandbox;
    })();
  </script>
  <style>
    :root {
      --bg: #0a1628;
      --panel: #132238;
      --gold: #f4c430;
      --gold-dim: #c9a227;
      --accent: #4ecdc4;
      --text: #e8f0ff;
      --reel-bg: #1a2d4a;
      --win: #7bed9f;

      /* 반응형 스케일 (기본: 일반 스마트폰) */
      --safe-t: env(safe-area-inset-top, 0px);
      --safe-r: env(safe-area-inset-right, 0px);
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-l: env(safe-area-inset-left, 0px);
      --frame-pad: clamp(0.15rem, 1.2vw, 0.35rem);
      --frame-max: min(420px, 100%);
      --frame-w: min(
        calc(100vw - var(--safe-l) - var(--safe-r) - var(--frame-pad) * 2),
        calc((100dvh - var(--safe-t) - var(--safe-b) - var(--frame-pad) * 2) * 9 / 16),
        var(--frame-max)
      );
      --symbol-h: clamp(2.65rem, 14vw, 3.5rem);
      --reel-h: calc(var(--symbol-h) * 3);
      --reels-width: clamp(68%, 72vw, 78%);
      --bank-row-width: clamp(52%, 50vw, 62%);
      --gap-xs: clamp(0.15rem, 1vw, 0.3rem);
      --gap-sm: clamp(0.2rem, 1.4vw, 0.35rem);
      --pad-in: clamp(0.2rem, 1.8vw, 0.35rem);
      --btn-fs: clamp(0.68rem, 2.8vw, 0.82rem);
      --btn-pad-y: clamp(0.42rem, 2vw, 0.55rem);
      --btn-pad-x: clamp(0.5rem, 3vw, 0.9rem);
      --pill-fs-title: clamp(0.72rem, 3.2vw, 1rem);
      --pill-fs-sub: clamp(0.52rem, 2.2vw, 0.68rem);
      --jamo-fs: clamp(1.15rem, 5.5vw, 1.45rem);
      --special-svg: clamp(1.5rem, 7vw, 1.875rem);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    [hidden] {
      display: none !important;
    }

    body {
      min-height: 100dvh;
      min-height: 100svh;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background: radial-gradient(ellipse at 50% 0%, #1a3a5c 0%, var(--bg) 55%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--frame-pad);
      padding-top: max(var(--frame-pad), var(--safe-t));
      padding-bottom: max(var(--frame-pad), var(--safe-b));
      padding-left: max(var(--frame-pad), var(--safe-l));
      padding-right: max(var(--frame-pad), var(--safe-r));
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }

    .game-frame {
      width: var(--frame-w);
      height: auto;
      max-height: calc(100dvh - var(--safe-t) - var(--safe-b) - var(--frame-pad) * 2);
      max-height: calc(100svh - var(--safe-t) - var(--safe-b) - var(--frame-pad) * 2);
      background: linear-gradient(180deg, #1a3050 0%, #0a1628 45%, #132238 100%);
      border: 2px solid var(--gold-dim);
      border-radius: clamp(8px, 2vw, 10px);
      box-shadow:
        0 0 0 1px #5c4a12,
        0 6px 24px rgba(0, 0, 0, 0.55);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .game-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--gap-xs);
      padding: var(--pad-in) var(--pad-in) calc(var(--pad-in) * 0.75);
      flex-shrink: 0;
    }

    .status-pill {
      display: inline-block;
      border-radius: 999px;
      padding: calc(var(--pad-in) * 0.9) clamp(0.5rem, 3.5vw, 0.65rem);
      text-align: center;
      font-weight: 700;
      line-height: 1.35;
      max-width: 100%;
      border: 1.5px solid rgba(244, 196, 48, 0.5);
      background: linear-gradient(180deg, rgba(255, 224, 130, 0.35) 0%, rgba(201, 162, 39, 0.28) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.2),
        0 2px 8px rgba(0, 0, 0, 0.25);
    }

    .title-pill {
      font-size: var(--pill-fs-title);
      color: var(--gold);
      letter-spacing: 0.05em;
      margin: 0;
    }

    .subtitle-pill {
      font-size: var(--pill-fs-sub);
      color: #e8f0ff;
      font-weight: 600;
      border-color: rgba(78, 205, 196, 0.45);
      background: linear-gradient(180deg, rgba(78, 205, 196, 0.22) 0%, rgba(19, 34, 56, 0.55) 100%);
    }

    .subtitle-pill strong { color: var(--gold); font-weight: 800; }

    .pi-bar {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      margin-top: auto;
      padding: var(--gap-xs) var(--pad-in) max(var(--pad-in), var(--safe-b));
      flex-shrink: 0;
      gap: var(--gap-xs);
    }

    .pi-login-btn {
      width: var(--reels-width);
      max-width: 100%;
      margin: 0 auto;
      font-size: var(--btn-fs);
      font-weight: 800;
      padding: var(--btn-pad-y) var(--btn-pad-x);
      border-radius: 10px;
      border: 1.5px solid #6b21a8;
      background: linear-gradient(180deg, #c084fc 0%, #9333ea 100%);
      color: #fff;
      cursor: pointer;
      box-shadow: 0 3px 0 #6b21a8, 0 2px 6px rgba(0, 0, 0, 0.25);
      letter-spacing: 0.03em;
      flex-shrink: 0;
    }

    .pi-login-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .pi-user-pill {
      font-size: var(--pill-fs-sub);
      color: #f3e8ff;
      border-color: rgba(192, 132, 252, 0.55);
      background: linear-gradient(180deg, rgba(147, 51, 234, 0.35) 0%, rgba(19, 34, 56, 0.55) 100%);
      width: var(--reels-width);
      max-width: 100%;
      margin: 0 auto;
      text-align: center;
    }

    .legal-footer {
      width: 100%;
      text-align: center;
      padding: 8px var(--pad-in) 4px;
      font-size: 0.72rem;
      color: #8a96b0;
    }
    .legal-footer a { color: #7dd3fc; text-decoration: none; }
    .legal-footer a:hover { text-decoration: underline; }

    .hud {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: var(--gap-xs);
      padding: 0 var(--pad-in) calc(var(--pad-in) * 0.75);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .stat {
      background: linear-gradient(180deg, #ffe082 0%, #ffc107 100%);
      border: 1.5px solid #e6a800;
      border-radius: 8px;
      padding: calc(var(--pad-in) * 0.9) clamp(0.3rem, 2vw, 0.45rem);
      text-align: center;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.45),
        0 2px 4px rgba(0, 0, 0, 0.2);
      min-width: 0;
    }

    .stat label {
      display: block;
      font-size: clamp(0.42rem, 2vw, 0.48rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #5c4a12;
      margin-bottom: 0.08rem;
      line-height: 1.1;
      white-space: nowrap;
    }

    .stat span {
      font-size: clamp(0.55rem, 2.4vw, 0.62rem);
      font-weight: 800;
      color: #1a1408;
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 0.15rem;
      flex-wrap: nowrap;
      line-height: 1.1;
      white-space: nowrap;
    }

    .kr-unit {
      font-size: 0.42rem;
      font-weight: 800;
      color: #1a1408;
      background: rgba(255, 255, 255, 0.55);
      padding: 0.06rem 0.22rem;
      border-radius: 3px;
      letter-spacing: 0.02em;
      border: 1px solid rgba(230, 168, 0, 0.6);
    }

    .stat--coin label { color: #6b4f0a; }

    .machine {
      flex: 0 0 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: var(--gap-xs);
      background: linear-gradient(180deg, rgba(42, 31, 10, 0.35) 0%, rgba(19, 34, 56, 0.6) 100%);
      border-top: 1px solid rgba(244, 196, 48, 0.2);
      padding: var(--pad-in);
      width: 100%;
      box-shadow: none;
      border-radius: 0;
      border: none;
    }

    .reels-wrap {
      position: relative;
      background: var(--reel-bg);
      border-radius: 8px;
      padding: 0.25rem;
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      min-height: calc(var(--reel-h) + 1.5rem);
    }

    .grid-label {
      display: inline-block;
      text-align: center;
      font-size: clamp(0.62rem, 2.6vw, 0.75rem);
      font-weight: 800;
      color: var(--gold);
      margin-bottom: 0.2rem;
      letter-spacing: 0.1em;
      padding: 0.12rem 0.55rem;
      border-radius: 999px;
      border: 1px solid rgba(244, 196, 48, 0.45);
      background: rgba(244, 196, 48, 0.12);
      flex-shrink: 0;
    }

    .payline {
      display: none;
    }

    .reels {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(3px, 0.8vw, 4px);
      width: var(--reels-width);
      margin: 0 auto;
    }

    .reel {
      background: transparent;
      border-radius: 8px;
      overflow: hidden;
      height: var(--reel-h);
      position: relative;
      border: none;
    }

    .reel.stopping .symbol:nth-child(n) {
      border-color: rgba(255, 230, 100, 0.75);
      box-shadow: 0 0 8px rgba(255, 230, 100, 0.35);
    }

    .reel-strip {
      display: flex;
      flex-direction: column;
      will-change: transform;
    }

    .symbol {
      height: var(--symbol-h);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding: 2px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(244, 196, 48, 0.28);
      border-radius: 6px;
    }

    .symbol.jamo {
      font-size: var(--jamo-fs);
      font-weight: 700;
      color: #fff;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
    }

    .symbol.special svg {
      width: var(--special-svg);
      height: var(--special-svg);
    }

    .symbol.special .sym-label {
      font-size: clamp(0.36rem, 1.8vw, 0.42rem);
      margin-top: 2px;
      color: var(--accent);
      font-weight: 600;
    }

    .symbol.special {
      flex-direction: column;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: var(--gap-xs);
      justify-content: center;
      margin-top: var(--gap-xs);
      align-items: center;
      flex-shrink: 0;
    }

    .control-row {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      gap: 0.3rem;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    .bet-row {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      gap: 0.35rem;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .bank-presets-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--gap-xs);
      width: var(--bank-row-width);
      margin: 0 auto;
    }

    .bank-actions-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--gap-xs);
      width: var(--bank-row-width);
      margin: 0 auto;
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      transition: transform 0.1s, filter 0.15s;
    }

    button:active:not(:disabled) { transform: scale(0.97); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    #spinBtn {
      background: linear-gradient(180deg, #ffd54f, var(--gold-dim));
      color: #1a1408;
      font-size: clamp(0.82rem, 3.2vw, 0.95rem);
      padding: var(--btn-pad-y) clamp(1rem, 5vw, 1.6rem);
      box-shadow: 0 3px 0 #8a7018, 0 4px 14px rgba(244, 196, 48, 0.3);
    }

    #spinBtn:hover:not(:disabled) { filter: brightness(1.08); }

    .spin-group {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      gap: 0.35rem;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .auto-btn {
      background: linear-gradient(180deg, #5eead4, #2dd4bf);
      color: #0a1628;
      font-size: var(--btn-fs);
      padding: var(--btn-pad-y) var(--btn-pad-x);
      box-shadow: 0 3px 0 #0f766e;
    }

    .auto-btn.active {
      box-shadow: 0 0 0 2px var(--accent), 0 4px 0 #0f766e;
      animation: auto-pulse 1s ease infinite;
    }

    @keyframes auto-pulse {
      50% { filter: brightness(1.12); }
    }

    .stop-btn {
      background: linear-gradient(180deg, #f87171, #dc2626);
      color: #fff;
      font-size: var(--btn-fs);
      padding: var(--btn-pad-y) var(--btn-pad-x);
      box-shadow: 0 3px 0 #991b1b;
    }

    .stop-btn:hover:not(:disabled) { filter: brightness(1.1); }

    .bet-btn {
      background: var(--panel);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: var(--btn-pad-y) clamp(0.45rem, 2.5vw, 0.75rem);
      font-size: var(--btn-fs);
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .bet-btn.active {
      border-color: var(--gold);
      color: var(--gold);
    }

    .message {
      display: block;
      width: fit-content;
      max-width: calc(100% - 0.3rem);
      margin: 0.25rem auto 0;
      min-height: 2.75rem;
      text-align: center;
      font-size: clamp(0.58rem, 2.5vw, 0.75rem);
      line-height: 1.35;
      flex-shrink: 0;
      padding: 0.28rem 0.6rem;
      border-radius: 999px;
      border: 1.5px solid rgba(244, 196, 48, 0.4);
      background: linear-gradient(180deg, rgba(26, 45, 74, 0.9) 0%, rgba(13, 26, 46, 0.95) 100%);
      color: var(--text);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .message.win {
      color: var(--win);
      font-weight: 600;
      border-color: rgba(123, 237, 159, 0.55);
      background: linear-gradient(180deg, rgba(30, 60, 45, 0.92) 0%, rgba(13, 26, 46, 0.95) 100%);
    }

    .message.lose {
      opacity: 0.85;
      border-color: rgba(255, 255, 255, 0.15);
    }

    @keyframes pulse-win {
      0%, 100% { box-shadow: 0 0 0 0 rgba(123, 237, 159, 0.4); }
      50% { box-shadow: 0 0 20px 4px rgba(123, 237, 159, 0.25); }
    }

    .machine.winning {
      animation: pulse-win 0.8s ease 2;
    }

    .game-frame.winning {
      animation: pulse-win 0.8s ease 2;
    }

    .sound-toggle {
      background: transparent;
      color: var(--accent);
      border: 1px solid rgba(78, 205, 196, 0.4);
      padding: 0.35rem 0.45rem;
      font-size: 0.72rem;
      flex-shrink: 0;
    }

    .sound-toggle.muted { opacity: 0.5; }

    .bank-row {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      justify-content: center;
      align-items: center;
      margin-top: 0.25rem;
      padding-top: 0.25rem;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      width: 100%;
      flex-shrink: 0;
    }

    .bank-label {
      font-size: clamp(0.58rem, 2.4vw, 0.68rem);
      font-weight: 700;
      width: auto;
      text-align: center;
      margin-bottom: 0;
      color: #e8d5a3;
      padding: 0.26rem 0.6rem;
      border-radius: 999px;
      border: 1.5px solid rgba(244, 196, 48, 0.45);
      background: linear-gradient(180deg, rgba(255, 224, 130, 0.3) 0%, rgba(92, 74, 18, 0.45) 100%);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }

    .bank-preset {
      background: var(--panel);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.18);
      padding: 0.35rem 0.15rem;
      font-size: clamp(0.55rem, 2.4vw, 0.68rem);
      white-space: nowrap;
      width: 100%;
    }

    .bank-preset.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    .deposit-btn {
      background: linear-gradient(180deg, #86efac, #22c55e);
      color: #052e16;
      padding: 0.35rem 0.2rem;
      font-size: clamp(0.62rem, 2.6vw, 0.72rem);
      box-shadow: 0 2px 0 #15803d;
      width: 100%;
      white-space: nowrap;
    }

    .withdraw-btn {
      background: linear-gradient(180deg, #93c5fd, #3b82f6);
      color: #0c1929;
      padding: 0.35rem 0.2rem;
      font-size: clamp(0.62rem, 2.6vw, 0.72rem);
      box-shadow: 0 2px 0 #1d4ed8;
      width: 100%;
      white-space: nowrap;
    }

    .deposit-btn:hover:not(:disabled),
    .withdraw-btn:hover:not(:disabled),
    .free-btn:hover:not(:disabled) { filter: brightness(1.08); }

    .deposit-btn:disabled,
    .withdraw-btn:disabled,
    .free-btn:disabled {
      opacity: 0.45;
      filter: grayscale(0.35);
      cursor: not-allowed;
    }

    .free-btn {
      background: linear-gradient(180deg, #fde047, #eab308);
      color: #422006;
      padding: var(--btn-pad-y) clamp(0.15rem, 1.5vw, 0.2rem);
      font-size: var(--btn-fs);
      font-weight: 800;
      box-shadow: 0 2px 0 #a16207, 0 0 10px rgba(234, 179, 8, 0.35);
      letter-spacing: 0.04em;
      width: 100%;
      white-space: nowrap;
    }

    /* ── 모바일: 소형 (iPhone SE, Galaxy S mini 등 ~360px) ── */
    @media (max-width: 360px) {
      :root {
        --frame-max: 100%;
        --symbol-h: clamp(2.35rem, 13vw, 2.75rem);
        --reels-width: 76%;
        --bank-row-width: 58%;
        --btn-pad-x: clamp(0.4rem, 2.5vw, 0.65rem);
      }
    }

    /* ── 모바일: 중형 (iPhone 12~15, Galaxy S 등 361~430px) ── */
    @media (min-width: 361px) and (max-width: 430px) {
      :root {
        --frame-max: 400px;
        --reels-width: 72%;
        --bank-row-width: 55%;
      }
    }

    /* ── 모바일: 대형 (Plus/Pro Max, Ultra 등 431px+) ── */
    @media (min-width: 431px) {
      :root {
        --frame-max: 420px;
        --symbol-h: clamp(2.85rem, 13vw, 3.5rem);
        --reels-width: 70%;
        --bank-row-width: 52%;
      }
    }

    /* ── 세로 짧은 화면 (키보드·주소창·작은 높이) ── */
    @media (max-height: 640px) {
      :root {
        --symbol-h: clamp(2.2rem, 11vw, 2.65rem);
        --pad-in: clamp(0.15rem, 1.2vw, 0.25rem);
        --btn-pad-y: clamp(0.35rem, 1.6vw, 0.48rem);
      }
    }

    /* ── 가로 모드 ── */
    @media (orientation: landscape) and (max-height: 520px) {
      :root {
        --frame-w: min(
          calc(100vw - var(--safe-l) - var(--safe-r) - var(--frame-pad) * 2),
          calc((100dvh - var(--safe-t) - var(--safe-b) - var(--frame-pad) * 2) * 9 / 16),
          520px
        );
        --symbol-h: clamp(2rem, 10vh, 2.5rem);
        --reels-width: 58%;
        --bank-row-width: 48%;
      }

      body {
        justify-content: flex-start;
      }

      .game-frame {

  <script>
    const JAMO_GROUPS = [
      ["ㄱ", "ㅋ", "ㆁ"],
      ["ㄴ", "ㄷ", "ㅌ"],
      ["ㅁ", "ㅂ", "ㅍ"],
      ["ㅅ", "ㅈ", "ㅊ"],
      ["ㆆ", "ㅎ", "ㅇ"],
      ["ㅿ"],
      ["ㄹ"],
      ["ㄲ", "ㄸ", "ㅃ", "ㅆ", "ㅉ", "ㆅ"],
      ["ㆍ"],
      ["ㅡ"],
      ["ㅣ"],
      ["ㅗ", "ㅏ", "ㅜ", "ㅓ"],

    ];

    const SPECIALS = [
      { id: "tugeobi", label: "두꺼비", speak: "두꺼비", krPrize: 1_000_000 },
      { id: "ieodo", label: "이어도", speak: "이어도", krPrize: 500_000 },
      { id: "dokdo", label: "독도", speak: "독도", krPrize: 500_000 },
      { id: "baengnyeong", label: "백령도", speak: "백령도", krPrize: 500_000 },
      { id: "gageo", label: "가거도", speak: "가거도", krPrize: 500_000 },
      { id: "gyeokryeol", label: "격렬비열도", speak: "격렬비열도", krPrize: 500_000 },
    ];

    /** 고정 당첨금 (KR) — π 지갑 입금 시 환산 */
    const PRIZE_KR_TUGEOBI = 1_000_000;
    const PRIZE_KR_ISLAND = 500_000;
    const PRIZE_KR_JAMO = 300_000;

    const JAMO_SPEAK = {
      "ㄱ": "기역", "ㅋ": "키읔", "ㆁ": "옛이응",
      "ㄴ": "니은", "ㄷ": "디귿", "ㅌ": "티읕",
      "ㅁ": "미음", "ㅂ": "비읍", "ㅍ": "피읖",
      "ㅅ": "시옷", "ㅈ": "지읒", "ㅊ": "치읓",
      "ㆆ": "여린히읗", "ㅎ": "히읗", "ㅇ": "이응",
      "ㅿ": "반시옷", "ㄹ": "리을",
      "ㄲ": "쌍기역", "ㄸ": "쌍디귿", "ㅃ": "쌍비읍", "ㅆ": "쌍시옷", "ㅉ": "쌍지읒", "ㆅ": "쌍반시옷",
      "ㆍ": "아래아", "ㅡ": "으", "ㅣ": "이",
      "ㅗ": "오", "ㅏ": "아", "ㅜ": "우", "ㅓ": "어",
      "ㅛ": "요", "ㅑ": "야", "ㅠ": "유", "ㅕ": "여",
    };

    const COIN = "KR";
    const COIN_LABEL = "win KR";
    const PI_COIN_LABEL = "π";
    const PI_TO_KR_RATE = 3141590;
    const INITIAL_BALANCE = 1000;
    const FREE_BONUS = 1000;
    const STORAGE_KEY = "hangul-slot-kr-balance";
    /* 배포: 프론트 GitHub Pages https://maducokr.github.io/han/
            백엔드 Render https://han-xe9x.onrender.com */
    window.PI_AUTH_VERIFY_URL =
      window.PI_AUTH_VERIFY_URL || "https://han-xe9x.onrender.com/api/pi/verify";
    window.PI_BACKEND_URL = window.PI_BACKEND_URL || "https://han-xe9x.onrender.com";

    let piConnected = false;
    let piUser = null;
    let piAccessToken = null;
    let piService = null;
    let piSdkReady = false;
    let piLoginBusy = false;
    let piPaymentBusy = false;
    let piInitDone = false;
    let initPiSdkPromise = null;
    const PI_SANDBOX_SESSION_KEY = "hangul-slot-pi-sandbox-mode";
    const PI_DEPOSIT_FLAG_PREFIX = "hangul-slot-pi-deposited-";
    /**
     * Pi App Studio 스코프
     * KRSLOT은 π 입금 필수 — Pi SDK는 로그인 후 payments 추가 인증이 불안정하므로
     * 로그인 시 username + payments 동시 요청 (공식 결제 앱 패턴)
     */
    const PI_AUTH_SCOPES_LOGIN = ["username", "payments"];
    const PI_AUTH_SCOPES_PAYMENT = ["username", "payments"];
    const PI_SESSION_KEY = "hangul-slot-pi-session-v2";

    function piToKr(piAmount) {
      return Math.floor(Number(piAmount) * PI_TO_KR_RATE);
    }

    function krToPi(krAmount) {
      return Number(krAmount) / PI_TO_KR_RATE;
    }

    /** KR → π (출금용, 7자리 내림) */
    function krToPiAmount(krAmount) {
      const kr = Math.floor(Number(krAmount) || 0);
      if (kr <= 0) return 0;
      return Math.floor((kr / PI_TO_KR_RATE) * 1e7) / 1e7;
    }

    function getPiDepositFlagKey() {
      const id = piUser?.uid || piUser?.username;
      return id ? `${PI_DEPOSIT_FLAG_PREFIX}${id}` : null;
    }

    /** 서버 검증된 UID 기준 사용자 식별 (Pi App Studio 권장) */
    function getPiUserId() {
      return piUser?.uid || piUser?.username || null;
    }

    function markPiDeposited() {
      const key = getPiDepositFlagKey();
      if (key) sessionStorage.setItem(key, "1");
    }

    function clearPiDepositedFlag() {
      const key = getPiDepositFlagKey();
      if (key) sessionStorage.removeItem(key);
    }

    /** Pi Browser: KR CASH 세션 활성 (스테이킹 완료) */
    function hasActiveKrSession() {
      if (!isPiBrowserEnv()) return true;
      if (!piConnected) return false;
      return !krSessionEnded && balance > 0;
    }

    /** Pi Browser: KR 소진 후 π 스테이킹 입금만 허용 */
    function isStakeDepositAllowed() {
      if (!isPiBrowserEnv()) return true;
      return balance <= 0;
    }

    function getMinBetKr() {
      let min = 5;
      document.querySelectorAll(".bet-btn").forEach((b) => {
        const n = Number(b.dataset.bet);
        if (n > 0) min = Math.min(min, n);
      });
      return min;
    }

    /** 세션 중 유저가 지불한 베팅 KR 합계 → 제작자 지갑 정산 대상 (당첨 π는 별도 지급) */
    function getSessionKrConsumed() {
      return Math.max(0, sessionKrBet);
    }

    /** 베팅 KR → π 환산 후 제작자(앱) 지갑 정산 */
    async function settleSessionToDeveloper(options) {
      const opts = options || {};
      const silent = !!opts.silent;
      const reason = opts.reason || "session_stop";
      const krConsumed = getSessionKrConsumed();
      if (krConsumed <= 0) {
        return { success: true, skipped: true, krConsumed: 0 };
      }
      if (!isPiBrowserEnv() || !piConnected || !piAccessToken) {
        return { success: false, skipped: true, krConsumed };
      }
      const base = getPiBackendBase();
      if (!base) {
        return { success: false, skipped: true, krConsumed };
      }
      if (spinning) {
        return { success: false, error: "스핀 진행 중", krConsumed };
      }

      try {
        piPaymentBusy = true;
        updateControls();
        if (!silent) {
          messageEl.innerHTML =
            `베팅 <strong>${krConsumed.toLocaleString("ko-KR")} KR</strong> → 제작자 지갑 π 입금 처리 중…`;
          messageEl.className = "message";
        }

        const settleRes = await fetch(`${base}/api/pi/session/settle`, {
          method: "POST",
          headers: { "Content-Type": "application/json", Accept: "application/json" },
          body: JSON.stringify(
            piApiPayload({
              accessToken: piAccessToken,
              krBalance: balance,
              krBet: sessionKrBet,
              krWon: sessionKrWon,
              krConsumed,
              rate: PI_TO_KR_RATE,
              settleType: reason,
              uid: piUser?.uid || null,
              username: piUser?.username || null,
            })
          ),
        });
        const settleData = await settleRes.json().catch(() => ({}));
        if (!settleRes.ok || !settleData.success) {
          throw new Error(settleData.error || "제작자 지갑 정산에 실패했습니다.");
        }

        const housePi =
          settleData.housePi != null ? Number(settleData.housePi) : krToPiAmount(krConsumed);
        sessionKrBet = 0;
        sessionKrWon = 0;

        return {
          success: true,
          krConsumed,
          housePi,
          message: settleData.message || null,
        };
      } catch (err) {
        console.warn("settleSessionToDeveloper:", err);
        return { success: false, error: err?.message || "정산 오류", krConsumed };
      } finally {
        piPaymentBusy = false;
        updateControls();
      }
    }

    /**
     * STOP·게임종료 시 KR 잔액(당첨금 포함) → π 본인 지갑 A2U
     * 베팅 KR은 제작자 지갑 정산(settle) 후 payout
     */
    async function payoutSessionKrToUserWallet(options = {}) {
      const reason = options.reason || "cashout";
      const silent = !!options.silent;

      if (spinning || piPaymentBusy) {
        return { success: false, error: "busy" };
      }
      if (!isPiBrowserEnv() || !piConnected || !piAccessToken) {
        return { success: false, skipped: true };
      }
      const base = getPiBackendBase();
      if (!base) {
        if (!silent) {
          messageEl.innerHTML = "백엔드 URL이 설정되지 않았습니다.";
          messageEl.className = "message lose";
        }
        return { success: false, error: "no backend" };
      }

      const krBalance = balance;
      const krConsumed = getSessionKrConsumed();
      const krWonSnapshot = sessionKrWon;
      const piAmount = krToPiAmount(krBalance);

      if (krBalance <= 0) {
        if (krConsumed > 0) {
          return settleSessionToDeveloper({ reason, silent });
        }
        return { success: true, skipped: true };
      }
      if (piAmount <= 0) {
        if (!silent) {
          messageEl.innerHTML = "π로 환산할 KR 잔액이 없습니다.";
          messageEl.className = "message lose";
        }
        return { success: false, error: "pi amount zero" };
      }

      if (!silent) {
        Sfx.unlock();
        Sfx.click();
      }
      piPaymentBusy = true;
      updateControls();
      if (!silent) {
        const winHint =
          krWonSnapshot > 0
            ? ` (당첨 <strong>${krWonSnapshot.toLocaleString("ko-KR")} KR</strong> 포함)`
            : "";
        messageEl.innerHTML =
          `게임 종료 처리 중… 잔액 <strong>${krBalance.toLocaleString("ko-KR")} KR</strong>${winHint} → ` +
          `<strong>${formatPi(piAmount)}</strong> · 본인 Pi 지갑 입금`;
        messageEl.className = "message";
      }

      try {
        if (krConsumed > 0) {
          const settleRes = await fetch(`${base}/api/pi/session/settle`, {
            method: "POST",
            headers: { "Content-Type": "application/json", Accept: "application/json" },
            body: JSON.stringify(
              piApiPayload({
                accessToken: piAccessToken,
                krBalance,
                krBet: sessionKrBet,
                krWon: krWonSnapshot,
                krConsumed,
                rate: PI_TO_KR_RATE,
                settleType: reason,
                uid: piUser?.uid || null,
                username: piUser?.username || null,
              })
            ),
          });
          const settleData = await settleRes.json().catch(() => ({}));
          if (!settleRes.ok || !settleData.success) {
            throw new Error(settleData.error || "게임 정산(제작자 지갑)에 실패했습니다.");
          }
          sessionKrBet = 0;
        }

        const payoutRes = await fetch(`${base}/api/pi/payments/payout`, {
          method: "POST",
          headers: { "Content-Type": "application/json", Accept: "application/json" },
          body: JSON.stringify(
            piApiPayload({
              accessToken: piAccessToken,
              amount: piAmount,
              memo: `KRSLOT ${reason === "stop" ? "STOP" : "게임종료"} ${krBalance.toLocaleString("ko-KR")} KR → π`,
              metadata: {
                type: reason === "stop" ? "stop_payout" : "cashout",
                krBalance,
                krBet: sessionKrBet,
                krWon: krWonSnapshot,
                krConsumed,
                piAmount,
                rate: PI_TO_KR_RATE,
                uid: piUser?.uid || null,
                username: piUser?.username || null,
              },
            })
          ),
        });
        const payoutData = await payoutRes.json().catch(() => ({}));
        if (!payoutRes.ok || !payoutData.success) {
          throw new Error(payoutData.error || "π 출금(유저 지갑)에 실패했습니다.");
        }

        balance = 0;
        krSessionEnded = true;
        clearPiDepositedFlag();
        resetGameSession();
        saveBalance();
        updateHud();
        if (!silent) Sfx.withdraw();

        const settleNote =
          krConsumed > 0
            ? `<br><small>베팅 ${krConsumed.toLocaleString("ko-KR")} KR → 제작자 지갑 ${formatPi(krToPiAmount(krConsumed))}</small>`
            : "";
        const winNote =
          krWonSnapshot > 0
            ? `<br><small>당첨금 ${krWonSnapshot.toLocaleString("ko-KR")} KR 포함 · 본인 π 지갑 입금</small>`
            : "";

        if (!silent) {
          const label = reason === "stop" ? "STOP" : "게임 종료";
          messageEl.innerHTML =
            `${label} · <strong>${formatPi(piAmount)}</strong>이 본인 Pi 지갑으로 입금되었습니다.${winNote}${settleNote}`;
          messageEl.className = "message win";
        }

        return {
          success: true,
          piAmount,
          krBalance,
          krConsumed,
          krWon: krWonSnapshot,
        };
      } catch (err) {
        if (!silent) {
          messageEl.textContent = err?.message || "KR → π 환급에 실패했습니다.";
          messageEl.className = "message lose";
          Sfx.lose();
        }
        console.warn("payoutSessionKrToUserWallet:", err);
        return { success: false, error: err?.message || "payout error" };
      } finally {
        piPaymentBusy = false;
        updateControls();
      }
    }

    /** STOP·AUTO 종료 시 KR 잔액(당첨 포함) → π 본인 지갑 */
    async function onGameStopSettle() {
      if (spinning || piPaymentBusy) return;
      if (!isPiBrowserEnv() || !piConnected) return;
      await payoutSessionKrToUserWallet({ reason: "stop", silent: false });
    }

    function resetGameSession() {
      sessionKrBet = 0;
      sessionKrWon = 0;
      sessionKrDeposited = 0;
      sessionPiStaked = 0;
    }

    /** KR 소진 · 최소 베팅 미만 잔액 → 세션 종료, π 스테이킹만 허용 */
    async function onKrSessionDepleted() {
      if (!isPiBrowserEnv() || !piConnected || krSessionEnded) return;
      krSessionEnded = true;
      clearPiDepositedFlag();
      if (getSessionKrConsumed() > 0) {
        await settleSessionToDeveloper({ reason: "depleted", silent: false });
      }
      resetGameSession();
      saveBalance();
      updateHud();
      if (autoMode) stopAuto(null);
      messageEl.innerHTML =
        `KR이 모두 소진되었습니다. <strong>π 스테이킹 입금</strong>으로 새 세션을 시작하세요. (1π = 3,141,590 KR)`;
      messageEl.className = "message lose";
      updateControls();
    }

    async function checkKrSessionEnd() {
      if (!isPiBrowserEnv() || !piConnected || krSessionEnded) return;
      if (balance <= 0) {
        await onKrSessionDepleted();
      }
    }

    function formatPi(piAmount) {
      const n = Number(piAmount);
      const text = Number.isInteger(n) ? n.toLocaleString("ko-KR") : n.toLocaleString("ko-KR", { maximumFractionDigits: 8 });
      return `${text} ${PI_COIN_LABEL}`;
    }

    function getPiBackendBase() {
      const custom = (window.PI_BACKEND_URL || "").trim().replace(/\/$/, "");
      if (custom) return custom;
      const verify = (window.PI_AUTH_VERIFY_URL || "").trim();
      if (!verify) return "";
      return verify.replace(/\/api\/pi\/verify\/?$/i, "");
    }

    /** 백엔드 API body — sandbox 플래그 (U2A·A2U·settle 공통) */
    function piApiPayload(fields) {
      return { ...fields, sandbox: isPiSandboxMode() };
    }

    /**
     * LLM 프레임워크 감지 — 이 프로젝트: vanilla HTML + Express
     * Express → pi-sdk-express → /payments (approve · complete · …)
     */
    const PI_APP_STACK = Object.freeze({
      frontend: "vanilla-js",
      frontendPackage: "pi-sdk-js",
      backend: "express",
      backendPackage: "pi-sdk-express",
      paymentsBasePath: "/payments",
      legacyPaymentsBasePath: "/api/pi/payments",
    });

    function detectPiAppStack() {
      return { ...PI_APP_STACK };
    }

    /** pi-sdk-express U2A 베이스 URL (Express 표준 /payments) */
    function getPiPaymentsBase() {
      const custom = (window.PI_PAYMENTS_BASE || "").trim().replace(/\/$/, "");
      if (custom) return custom;
      const backend = getPiBackendBase();
      if (!backend) return "";
      return `${backend}${PI_APP_STACK.paymentsBasePath}`;
    }

    window.detectPiAppStack = detectPiAppStack;

    function waitForPiSdk(maxMs) {
      return piClient.waitForGlobal(maxMs);
    }

    function isPiBrowserEnv() {
      return PiClient.isBrowserReady();
    }

    function syncPiSandboxSession() {
      const mode = isPiSandboxMode();
      const prev = sessionStorage.getItem(PI_SANDBOX_SESSION_KEY);
      const next = mode ? "1" : "0";
      if (prev !== null && prev !== next) {
        clearPiSession();
        piConnected = false;
        piUser = null;
        piAccessToken = null;
        if (piClient) {
          piClient._initDone = false;
          piClient._initPromise = null;
          piClient.accessToken = null;
          piClient.user = null;
        }
      }
      sessionStorage.setItem(PI_SANDBOX_SESSION_KEY, next);
      return mode;
    }

    function savePiSession(auth) {
      try {
        sessionStorage.setItem(
          PI_SESSION_KEY,
          JSON.stringify({
            accessToken: auth.accessToken,
            user: auth.user,
            paymentsScopeGranted: !!auth.paymentsScopeGranted,
            verifiedAt: auth.verifiedAt || Date.now(),
            savedAt: Date.now(),
          })
        );
      } catch (_) {}
    }

    function loadPiSession() {
      try {
        const raw = sessionStorage.getItem(PI_SESSION_KEY);
        if (!raw) return null;
        const data = JSON.parse(raw);
        if (!data?.accessToken) return null;
        return data;
      } catch (_) {
        return null;
      }
    }

    function clearPiSession() {
      try {
        sessionStorage.removeItem(PI_SESSION_KEY);
      } catch (_) {}
    }

    const PI_CONNECT_TIMEOUT_MS = 45000;

    /** sandbox: PiNet·GitHub Pages·로컬 = 테스트넷 기본 (메인넷: ?sandbox=0) */
    function isPiSandboxMode() {
      if (typeof window.__PI_SANDBOX_ACTIVE__ === "boolean") {
        return window.__PI_SANDBOX_ACTIVE__;
      }
      if (typeof window.detectPiSandbox === "function") {
        return window.detectPiSandbox();
      }
      const qs = new URLSearchParams(location.search);
      if (qs.has("sandbox")) {
        const v = qs.get("sandbox");
        return v !== "0" && v !== "false";
      }
      const host = location.hostname;
      if (host === "localhost" || host === "127.0.0.1") return true;
      if (host.indexOf("sandbox.minepi.com") !== -1) return true;
      if (host.endsWith(".pinet.com") || host === "pinet.com") return true;
      if (host === "github.io" || host.endsWith(".github.io")) return true;
      try {
        if (document.referrer.indexOf("sandbox.minepi.com") !== -1) return true;
      } catch (_) {}
      return false;
    }

    function ensurePiInitialized() {
      return piClient.ensureReady();
    }

    /**
     * pi-sdk-js PiSdkBase — window.Pi 단일 브리지
     * | 가이드              | 이 프로젝트 (vanilla HTML)     |
     * | pi-sdk-react        | getPiConnection() → {connected,user} |
     * | pi-sdk-nextjs       | (해당 없음)                    |
     * | pi-sdk-js           | PiSdkBase.connect() → 인증     |
     * LLM 모범 사례: async/await · try/catch(취소) · 스코프 최소화 · sandbox
     * 바닐라: import { PiSdkBase } from 'pi-sdk-js'; await pi.connect();
     */
    class PiClient {
      /** 로그인용 — init · authenticate 만 필요 (createPayment는 init 이후) */
      static isBrowserReady() {
        return (
          typeof window.Pi !== "undefined" &&
          typeof window.Pi.init === "function" &&
          typeof window.Pi.authenticate === "function"
        );
      }

      /** π 결제용 — createPayment 포함 */
      static canPay() {
        return (
          PiClient.isBrowserReady() &&
          typeof window.Pi.createPayment === "function"
        );
      }

      static isAvailable() {
        return PiClient.isBrowserReady();
      }

      /** pi-sdk-js PiSdkBase static — 싱글톤 piClient 상태 */
      static get user() {
        return piClient?.user ?? null;
      }

      static get connected() {
        return !!(piClient?.connected && piClient?.accessToken);
      }

      static get accessToken() {
        return piClient?.accessToken ?? null;
      }

      /** connectPi · depositPi — 로그인 가능 여부 */
      isAvailable() {
        return PiClient.isBrowserReady();
      }

      canPay() {
        return PiClient.canPay();
      }

      constructor() {
        this._initDone = false;
        this._initPromise = null;
        this.user = null;
        this.accessToken = null;
        this.connected = false;
      }

      waitForGlobal(maxMs) {
        const limit = maxMs || 8000;
        return new Promise((resolve) => {
          if (PiClient.isBrowserReady()) {
            resolve(true);
            return;
          }
          const t0 = Date.now();
          const timer = setInterval(() => {
            if (PiClient.isBrowserReady()) {
              clearInterval(timer);
              resolve(true);
            } else if (Date.now() - t0 >= limit) {
              clearInterval(timer);
              resolve(false);
            }
          }, 150);
        });
      }

      async init() {
        const sandbox = isPiSandboxMode();
        if (
          this._initDone &&
          typeof window.__PI_SANDBOX_ACTIVE__ === "boolean" &&
          window.__PI_SANDBOX_ACTIVE__ !== sandbox
        ) {
          this._initDone = false;
          this._initPromise = null;
        }
        if (this._initDone) return;
        if (this._initPromise) return this._initPromise;
        this._initPromise = (async () => {
          const loaded = await this.waitForGlobal(10000);
          if (!loaded) {
            throw new Error("Pi Browser에서 앱을 열어 주세요.");
          }
          await Promise.resolve(window.Pi.init({ version: "2.0", sandbox }));
          window.__PI_INIT_DONE__ = true;
          window.__PI_SANDBOX_ACTIVE__ = sandbox;
          this._initDone = true;
          piInitDone = true;
        })();
        try {
          await this._initPromise;
        } catch (err) {
          this._initPromise = null;
          throw err;
        }
      }

      async ensureReady() {
        if (!PiClient.isBrowserReady()) {
          const loaded = await this.waitForGlobal(10000);
          if (!loaded) {
            throw new Error("Pi Browser에서 앱을 열어 주세요.");
          }
        }
        await this.init();
      }

      /**
       * pi-sdk-js PiSdkBase.connect() — init + authenticate (세션 핸드셰이크)
       * @param {{ scopes?: string[], onIncompletePayment?: Function }} options
       */
      async connect(options = {}) {
        await this.ensureReady();
        const scopes = options.scopes || PI_AUTH_SCOPES_LOGIN;
        const incompleteCb = options.onIncompletePayment || onIncompletePayment;
        try {
          const auth = await window.Pi.authenticate(scopes, incompleteCb);
          if (auth?.accessToken) {
            this.accessToken = auth.accessToken;
            this.user = auth.user || null;
            this.connected = true;
          }
          return auth;
        } catch (err) {
          const msg = err?.message || String(err || "");
          if (/cancel/i.test(msg)) {
            throw new Error("사용자가 인증을 취소했습니다.");
          }
          throw err;
        }
      }

      /** @deprecated connect() 사용 권장 — authenticate는 connect 내부 호출 */
      async authenticate(scopes, onIncompletePayment) {
        return this.connect({ scopes, onIncompletePayment });
      }

      /** pi-sdk-react usePiPurchase / createPayment 트리거 */
      createPayment(paymentData, callbacks) {
        if (!this._initDone) {
          throw new Error("Pi SDK가 초기화되지 않았습니다.");
        }
        if (typeof window.Pi.createPayment !== "function") {
          throw new Error("π 결제 API를 사용할 수 없습니다.");
        }
        return window.Pi.createPayment(paymentData, callbacks);
      }

      createPaymentAsync(paymentData, accessToken) {
        return new Promise((resolve, reject) => {
          const callbacks = createU2APaymentCallbacks(accessToken, {
            onCompleted: resolve,
            onCancel: () =>
              reject(
                new Error(
                  "π 결제 승인 시간이 초과되었거나 취소되었습니다. (서버 approve·Pi Browser 팝업 확인)"
                )
              ),
            onError: (error) => {
              const err =
                error instanceof Error ? error : new Error(error?.message || "π 결제 오류");
              if (/without.*payments.*scope|payments.*scope/i.test(err.message)) {
                reject(new Error("Cannot create a payment without 'payments' scope"));
              } else {
                reject(err);
              }
            },
          });
          try {
            const ret = this.createPayment(paymentData, callbacks);
            if (ret && typeof ret.then === "function") {
              ret.catch((err) => {
                const msg = err?.message || "";
                if (/without.*payments.*scope|payments.*scope/i.test(msg)) {
                  reject(new Error("Cannot create a payment without 'payments' scope"));
                } else {
                  reject(err);
                }
              });
            }
          } catch (err) {
            const msg = err?.message || "";
            if (/without.*payments.*scope|payments.*scope/i.test(msg)) {
              reject(new Error("Cannot create a payment without 'payments' scope"));
            } else {
              reject(err);
            }
          }
        });
      }
    }

    /** pi-sdk-js onIncompletePayment — authenticate 2번째 인자 */
    function onIncompletePayment(payment) {
      if (piService) {
        piService.onIncompletePaymentFound(payment);
        return;
      }
      console.warn("[Pi] incomplete payment:", payment?.identifier);
      try {
        if (payment?.identifier) {
          sessionStorage.setItem(PI_INCOMPLETE_PAYMENT_KEY, payment.identifier);
        }
        const txid = payment?.transaction?.txid || payment?.transaction_id || null;
        if (txid) {
          sessionStorage.setItem(PI_INCOMPLETE_TX_KEY, txid);
        }
      } catch (_) {}
    }

    /** pi-sdk-js: const pi = new PiSdkBase(); await pi.connect({ scopes }) */
    const piClient = new PiClient();
    const piSdk = piClient;
    const pi = piClient;
    const PiSdkBase = PiClient;
    window.pi = piClient;
    window.piClient = piClient;
    window.piSdk = piClient;
    window.PiSdkBase = PiClient;

    const PI_INCOMPLETE_PAYMENT_KEY = "pi-incomplete-payment";
    const PI_INCOMPLETE_TX_KEY = "pi-incomplete-txid";

    /** pi-sdk-express U2A — Express /payments/* (LLM: Express → pi-sdk-express) */
    const PI_U2A_SUFFIX = {
      approve: "/approve",
      complete: "/complete",
      cancel: "/cancel",
      error: "/error",
      incomplete: "/incomplete",
    };

    function getPiU2ABases() {
      const backend = getPiBackendBase();
      if (!backend) return [];
      const standard = `${backend}${PI_APP_STACK.paymentsBasePath}`;
      const legacy = `${backend}${PI_APP_STACK.legacyPaymentsBasePath}`;
      const custom = (window.PI_PAYMENTS_BASE || "").trim().replace(/\/$/, "");
      if (custom) return [custom];
      return standard === legacy ? [standard] : [standard, legacy];
    }

    let paymentKeepAliveTimer = null;
    let backendReadyPromise = null;
    let lastPiAuthAt = 0;

    function pingPiBackendHealth() {
      const base = getPiBackendBase();
      if (!base) return Promise.resolve(false);
      return fetch(`${base}/health`, { method: "GET", cache: "no-store" })
        .then((res) => res.ok)
        .catch(() => false);
    }

    function pingPiPaymentsWarmup() {
      const bases = getPiU2ABases();
      if (!bases.length) return Promise.resolve(false);
      return fetch(`${bases[0]}/approve`, {
        method: "POST",
        headers: { "Content-Type": "application/json", Accept: "application/json" },
        body: JSON.stringify({ paymentId: "__warmup__", sandbox: isPiSandboxMode() }),
        cache: "no-store",
      })
        .then((res) => res.ok || res.status === 400 || res.status === 401 || res.status === 502)
        .catch(() => false);
    }

    /** Render 콜드 스타트 방지 — 결제 팝업 전 서버·approve 경로 준비 */
    async function ensurePiBackendReady(options = {}) {
      const maxMs = options.maxMs ?? 45000;
      const onProgress = options.onProgress;
      if (backendReadyPromise && !options.force) {
        return backendReadyPromise;
      }
      backendReadyPromise = (async () => {
        const t0 = Date.now();
        let attempt = 0;
        while (Date.now() - t0 < maxMs) {
          attempt += 1;
          const healthOk = await pingPiBackendHealth();
          const payOk = await pingPiPaymentsWarmup();
          if (healthOk && payOk) return true;
          if (onProgress) {
            onProgress(attempt, Date.now() - t0, healthOk, payOk);
          }
          await new Promise((r) => setTimeout(r, Math.min(1500 + attempt * 400, 4000)));
        }
        return false;
      })();
      try {
        return await backendReadyPromise;
      } finally {
        backendReadyPromise = null;
      }
    }

    function startPaymentKeepAlive() {
      stopPaymentKeepAlive();
      pingPiBackendHealth().catch(() => {});
      pingPiPaymentsWarmup().catch(() => {});
      paymentKeepAliveTimer = setInterval(() => {
        pingPiBackendHealth().catch(() => {});
        pingPiPaymentsWarmup().catch(() => {});
      }, 4000);
    }

    function stopPaymentKeepAlive() {
      if (paymentKeepAliveTimer) {
        clearInterval(paymentKeepAliveTimer);
        paymentKeepAliveTimer = null;
      }
    }

    function formatPiPaymentError(err) {
      const msg = err?.message || String(err || "");
      if (/cancel|취소/i.test(msg)) {
        return "π 결제가 취소되었습니다.";
      }
      if (/승인 시간|timeout|만료|expired/i.test(msg)) {
        return "π 결제 승인 시간이 초과되었습니다. (서버 approve·Pi Browser 확인)";
      }
      if (/payment_not_found/i.test(msg)) {
        return "결제 ID를 찾을 수 없습니다. 테스트넷 API Key·sandbox 모드가 일치하는지 확인해 주세요.";
      }
      if (/unauthorized|invalid.*key|401/i.test(msg)) {
        return "Pi API Key가 올바르지 않습니다. Render PI_SANDBOX_API_KEY(Testnet)를 확인해 주세요.";
      }
      if (/too many requests|429/i.test(msg)) {
        return "요청이 너무 많습니다. 1분 후 다시 시도해 주세요.";
      }
      if (/failed to fetch|network/i.test(msg)) {
        return "백엔드 연결 실패. Render 서버 상태를 확인해 주세요.";
      }
      return msg || "π 결제에 실패했습니다.";
    }

    async function postPiU2A(pathKey, body) {
      const bases = getPiU2ABases();
      if (!bases.length) throw new Error("백엔드 URL이 설정되지 않았습니다.");
      const path = PI_U2A_SUFFIX[pathKey];
      if (!path) throw new Error(`Unknown U2A path: ${pathKey}`);

      const payload = {
        ...body,
        sandbox: body?.sandbox ?? isPiSandboxMode(),
      };
      const maxAttempts = pathKey === "approve" ? 6 : 2;

      let lastError = null;
      for (let i = 0; i < bases.length; i++) {
        const url = `${bases[i]}${path}`;
        for (let attempt = 0; attempt < maxAttempts; attempt++) {
          try {
            const res = await fetch(url, {
              method: "POST",
              headers: { "Content-Type": "application/json", Accept: "application/json" },
              body: JSON.stringify(payload),
              cache: "no-store",
            });
            const data = await res.json().catch(() => ({}));
            if (res.status === 404 && i < bases.length - 1) {
              lastError = new Error(data.error || `π 결제 ${pathKey} 404`);
              break;
            }
            const retryStatus =
              res.status === 502 || res.status === 503 || res.status === 504 || res.status === 408;
            if (retryStatus && attempt < maxAttempts - 1) {
              await pingPiBackendHealth().catch(() => {});
              await pingPiPaymentsWarmup().catch(() => {});
              await new Promise((r) => setTimeout(r, 800 * (attempt + 1)));
              continue;
            }
            if (!res.ok || data.success === false) {
              throw new Error(data.error || `π 결제 ${pathKey} 실패 (${res.status})`);
            }
            return data;
          } catch (err) {
            lastError = err;
            const retryable =
              pathKey === "approve" &&
              attempt < maxAttempts - 1 &&
              /failed to fetch|502|503|504|408|network|timeout/i.test(err?.message || "");
            if (retryable) {
              await pingPiBackendHealth().catch(() => {});
              await pingPiPaymentsWarmup().catch(() => {});
              await new Promise((r) => setTimeout(r, 800 * (attempt + 1)));
              continue;
            }
            if (i < bases.length - 1 && /404/.test(err?.message || "")) break;
            throw err;
          }
        }
      }
      throw lastError || new Error(`π 결제 ${pathKey} 실패`);
    }

    /** @deprecated ensurePiBackendReady 사용 */
    async function warmPiBackend() {
      return ensurePiBackendReady({ maxMs: 12000 });
    }

    /** @deprecated ensurePiBackendReady 사용 */
    async function warmPiBackendPayments() {
      return pingPiPaymentsWarmup();
    }

    /**
     * 풀스택 U2A 핸드셰이크 (pi-sdk-express PiExpress)
     * 프론트 createPayment → paymentId → POST approve → txid → POST complete
     */
    function createU2APaymentCallbacks(accessToken, handlers) {
      const h = handlers || {};
      return {
        onReadyForServerApproval: async (paymentId) => {
          const t0 = Date.now();
          try {
            /* Pi 승인 타임아웃 ~20s — warm·재인증 없이 approve만 즉시 호출 */
            await postPiU2A("approve", {
              paymentId,
              accessToken,
              sandbox: isPiSandboxMode(),
            });
            console.info(
              "[Pi] approve OK",
              paymentId,
              Date.now() - t0,
              "ms",
              "sandbox:",
              isPiSandboxMode()
            );
          } catch (err) {
            console.error(
              "[Pi] approve FAIL",
              paymentId,
              Date.now() - t0,
              "ms",
              "sandbox:",
              isPiSandboxMode(),
              err
            );
            throw new Error(formatPiPaymentError(err));
          }
        },
        onReadyForServerCompletion: async (paymentId, txid) => {
          await postPiU2A("complete", { paymentId, transactionId: txid, txid });
          h.onCompleted?.(paymentId, txid);
        },
        onCancel: (paymentId) => {
          postPiU2A("cancel", { paymentId }).catch(() => {});
          h.onCancel?.(paymentId);
        },
        onError: (error, payment) => {
          const paymentId = payment?.identifier || payment?.paymentId || null;
          if (paymentId) {
            postPiU2A("error", {
              paymentId,
              error: error?.message || String(error || "unknown"),
            }).catch(() => {});
          }
          h.onError?.(error, payment);
        },
      };
    }

    function formatPiAuthError(err) {
      const msg = err?.message || String(err || "");
      if (/cancel|취소/i.test(msg)) return "로그인이 취소되었습니다.";
      if (/timeout/i.test(msg)) return "연결 시간이 초과되었습니다.";
      if (/failed to fetch|networkerror|load failed/i.test(msg)) {
        return "백엔드 연결 실패 — Render 서버가 깨어 있는지 확인 후 다시 시도해 주세요.";
      }
      if (/cors|forbidden|403/i.test(msg)) {
        return "서버 CORS 차단 — 앱 Origin이 백엔드에 허용되지 않았습니다.";
      }
      if (/invalid access token|서버 검증|verification failed/i.test(msg)) {
        return "로그인 토큰 검증 실패 — Pi Browser에서 다시 로그인해 주세요.";
      }
      if (/not registered|domain|origin|host/i.test(msg)) {
        return "Developer Portal에 앱 URL이 등록되어 있는지 확인해 주세요.";
      }
      return msg || "Pi 인증에 실패했습니다.";
    }

    let SYMBOL_H = 56;
    const REEL_COUNT = 3;
    const VISIBLE = 3;
    const SPIN_MS = 1800;
    const PRONOUNCE_TIMES = 5;

    function formatKr(amount) {
      const n = Math.floor(Number(amount) || 0);
      return `${n.toLocaleString("ko-KR")} <span class="kr-unit">${COIN_LABEL}</span>`;
    }

    function getBalanceStorageKey() {
      const id = getPiUserId();
      return id ? `${STORAGE_KEY}-${id}` : STORAGE_KEY;
    }

    function loadBalance() {

        if (saved !== null) {
          const n = parseInt(saved, 10);

    /**
     * PiService — PiClient(pi-sdk-js) + PiExpress(pi-sdk-express) 풀스택
     */
    class PiService {
      constructor() {
        this.client = piClient;
        this.user = null;
        this.accessToken = null;
        this.paymentsScopeGranted = false;
      }

      /** Pi SDK 필수 콜백 — 미완료 결제 저장 (로그인 시 /incomplete 처리) */
      onIncompletePaymentFound(payment) {
        console.warn("[Pi] incomplete payment:", payment?.identifier);
        try {
          if (payment?.identifier) {
            sessionStorage.setItem(PI_INCOMPLETE_PAYMENT_KEY, payment.identifier);
          }
          const txid = payment?.transaction?.txid || payment?.transaction_id || null;
          if (txid) {
            sessionStorage.setItem(PI_INCOMPLETE_TX_KEY, txid);
          }
        } catch (_) {}
      }

      /** 미완료 U2A 결제 — pi-sdk-express /incomplete 엔드포인트 */
      async resolveIncompletePayment(accessToken) {
        const paymentId = sessionStorage.getItem(PI_INCOMPLETE_PAYMENT_KEY);
        const transactionId = sessionStorage.getItem(PI_INCOMPLETE_TX_KEY);
        if (!paymentId || !transactionId || !accessToken) return;
        try {
          await postPiU2A("incomplete", { paymentId, transactionId, accessToken });
          sessionStorage.removeItem(PI_INCOMPLETE_PAYMENT_KEY);
          sessionStorage.removeItem(PI_INCOMPLETE_TX_KEY);
        } catch (err) {
          console.warn("[Pi] incomplete payment resolve:", err);
        }
      }

      /**
       * @param {string[]} scopes — 기본 ['username']
       */
      async login(scopes = PI_AUTH_SCOPES_LOGIN) {
        try {
          const auth = await this.client.connect({ scopes, onIncompletePayment });
          if (!auth?.accessToken) {
            return { success: false, error: "accessToken을 받지 못했습니다." };
          }

          let verifiedUser;
          try {
            verifiedUser = await verifyPiAccessToken(auth.accessToken);
          } catch (verifyErr) {
            const uid = auth.user?.uid;
            const canFallback =
              uid &&
              /failed to fetch|network|502|503|verification failed|서버 검증/i.test(
                verifyErr?.message || ""
              );
            if (canFallback) {
              console.warn("[Pi] server verify failed, using SDK user:", verifyErr?.message);
              verifiedUser = { uid, username: auth.user?.username || null };
            } else {
              throw verifyErr;
            }
          }
          await this.resolveIncompletePayment(auth.accessToken);

          this.accessToken = auth.accessToken;
          this.user = verifiedUser;
          this.paymentsScopeGranted = scopes.includes("payments");

          piAccessToken = auth.accessToken;
          piUser = verifiedUser;
          lastPiAuthAt = Date.now();
          savePiSession({
            accessToken: auth.accessToken,
            user: verifiedUser,
            paymentsScopeGranted: this.paymentsScopeGranted,
            verifiedAt: Date.now(),
          });

          console.info("[Pi] authenticated", verifiedUser.username || verifiedUser.uid);
          return {
            success: true,
            accessToken: auth.accessToken,
            user: verifiedUser,
          };
        } catch (error) {
          console.error("[Pi] Authentication Error:", error);
          return { success: false, error: error?.message || "인증에 실패했습니다." };
        }
      }

      /** π 입금 — payments 확보 (로그인 직후 재인증 방지) */
      async ensurePaymentsAuth() {
        const recentAuth = Date.now() - lastPiAuthAt < 15000;
        if (
          (this.paymentsScopeGranted || recentAuth) &&
          this.accessToken &&
          this.user &&
          (piClient.connected || piConnected)
        ) {
          return { success: true, accessToken: this.accessToken, user: this.user };
        }
        return this.login(PI_AUTH_SCOPES_PAYMENT);
      }

      /** U2A π 입금 — usePiPurchase().pay() 내부에서만 호출 */
      async executeU2APayment(paymentData, accessToken) {
        await this.client.ensureReady();
        if (!accessToken) {
          throw new Error("π 결제를 위해 Pi 로그인이 필요합니다.");
        }
        return this.client.createPaymentAsync(paymentData, accessToken);
      }
    }

    /**
     * pi-sdk-react 훅 패턴 — 바닐라 JS 대응
     * | React              | 이 프로젝트 (HTML)        |
     * | usePiConnection    | getPiConnection / connectPi |
     * | usePiPurchase      | usePiPurchase(data).pay()   |
     * | usePiAds           | usePiAds() (Ads 전용 래퍼)  |
     * 컴포넌트·이벤트 핸들러에서 window.Pi.* 직접 호출 금지
     */
    const piConnectionListeners = new Set();

    function getPiConnection() {
      return {
        connected: piConnected,
        user: piUser,
        accessToken: piAccessToken,
        ready: piSdkReady,
      };
    }

    function syncPiConnectionState(patch) {
      if (patch.connected !== undefined) piConnected = patch.connected;
      if (patch.user !== undefined) piUser = patch.user;
      if (patch.accessToken !== undefined) piAccessToken = patch.accessToken;
      if (patch.ready !== undefined) piSdkReady = patch.ready;
      if (piService) {
        if (patch.user !== undefined) piService.user = patch.user;
        if (patch.accessToken !== undefined) piService.accessToken = patch.accessToken;
      }
      const snapshot = getPiConnection();
      piConnectionListeners.forEach((fn) => {
        try {
          fn(snapshot);
        } catch (_) {}
      });
      return snapshot;
    }

    function subscribePiConnection(listener) {
      piConnectionListeners.add(listener);
      return () => piConnectionListeners.delete(listener);
    }

    /** usePiConnection().connect — pi-sdk-js PiSdkBase.connect() */
    async function connectPi(options) {
      const opts = options || {};
      const silent = !!opts.silent;
      const scopes = opts.scopes || PI_AUTH_SCOPES_LOGIN;

      if (piLoginBusy) return { success: false, error: "busy" };
      if (!piService) {
        await initPiSdk();
      }
      if (!piService) {
        if (!silent) {
          messageEl.textContent = "Pi SDK를 불러오는 중입니다. 잠시 후 다시 시도해 주세요.";
          messageEl.className = "message";
        }
        return { success: false, error: "Pi SDK not ready" };
      }
      if (!piClient.isAvailable()) {
        if (!silent) {
          messageEl.innerHTML =
            "Pi Browser에서 앱을 열어 <strong>Pi 로그인</strong>을 진행해 주세요.";
          messageEl.className = "message";
        }
        syncPiConnectionState({ connected: false, user: null, accessToken: null });
        updatePiUI(false);
        return { success: false, error: "not Pi Browser" };
      }

      try {
        await piClient.ensureReady();
      } catch (err) {
        if (!silent) {
          messageEl.textContent =
            err?.message || "Pi SDK 초기화에 실패했습니다. 앱을 새로고침해 주세요.";
          messageEl.className = "message lose";
        }
        return { success: false, error: err?.message || "init failed" };
      }

      piLoginBusy = true;
      if (!silent && piLoginBtn) {
        piLoginBtn.disabled = true;
        piLoginBtn.textContent = "연결 중…";
      }

      try {
        const result = await Promise.race([
          piService.login(scopes),
          new Promise((_, reject) =>
            setTimeout(
              () => reject(new Error("연결 시간이 초과되었습니다. 버튼을 다시 눌러 주세요.")),
              PI_CONNECT_TIMEOUT_MS
            )
          ),
        ]);
        if (result.success) {
          syncPiConnectionState({
            connected: true,
            user: result.user,
            accessToken: result.accessToken,
          });
          await onPiAuthenticated();
          return result;
        }
        syncPiConnectionState({ connected: false, user: null, accessToken: null });
        updatePiUI(false);
        if (!silent) {
          const mode = isPiSandboxMode() ? "sandbox" : "production";
          messageEl.textContent =
            "로그인 실패: " + (result.error || "알 수 없는 오류") + ` (${mode})`;
          messageEl.className = "message lose";
        }
        return result;
      } catch (error) {
        syncPiConnectionState({ connected: false, user: null, accessToken: null });
        clearPiSession();
        updatePiUI(false);
        if (!silent) {
          const mode = isPiSandboxMode() ? "sandbox" : "production";
          messageEl.textContent = `${formatPiAuthError(error)} (${mode} 모드)`;
          messageEl.className = "message lose";
        }
        console.warn("Pi login:", error);
        return { success: false, error: error?.message || "login failed" };
      } finally {
        piLoginBusy = false;
        if (piLoginBtn && !piConnected) {
          piLoginBtn.disabled = false;
          piLoginBtn.textContent = "Pi 로그인 (게스트 → 사용자)";
        }
      }
    }

    /**
     * usePiPurchase(paymentData) → { pay() }
     * window.Pi.createPayment 대체 — pay()만 호출
     */
    function usePiPurchase(paymentData) {
      return {
        async pay() {
          if (!piService) throw new Error("Pi SDK 준비 중입니다.");
          await piClient.ensureReady();
          let payAuth;
          if (
            piService.accessToken &&
            piService.user &&
            (piService.paymentsScopeGranted || Date.now() - lastPiAuthAt < 15000)
          ) {
            payAuth = {
              success: true,
              accessToken: piService.accessToken,
              user: piService.user,
            };
          } else {
            payAuth = await piService.ensurePaymentsAuth();
          }
          if (!payAuth.success) {
            throw new Error(payAuth.error || "π 결제를 위해 payments 권한이 필요합니다.");
          }
          syncPiConnectionState({
            accessToken: payAuth.accessToken,
            user: payAuth.user,
          });
          try {
            return await piService.executeU2APayment(paymentData, payAuth.accessToken);
          } catch (err) {
            const msg = err?.message || "";
            if (/without.*payments.*scope|payments.*scope/i.test(msg)) {
              piService.paymentsScopeGranted = false;
              payAuth = await piService.ensurePaymentsAuth();
              if (!payAuth.success) {
                throw new Error(payAuth.error || "π 결제 권한(payments)이 필요합니다.");
              }
              syncPiConnectionState({
                accessToken: payAuth.accessToken,
                user: payAuth.user,
              });
              return piService.executeU2APayment(paymentData, payAuth.accessToken);
            }
            throw err;
          }
        },
      };
    }

    /**
     * usePiAds — window.Pi.Ads 유일 허용 래퍼 (pi-sdk-react 가이드)
     * UI·이벤트 핸들러에서 window.Pi.Ads 직접 호출 금지
     */
    function usePiAds() {
      function getAdsApi() {
        return typeof window.Pi !== "undefined" ? window.Pi.Ads : null;
      }
      return {
        get supported() {
          const ads = getAdsApi();
          return !!(ads && (typeof ads.showAd === "function" || typeof ads.show === "function"));
        },
        async showRewarded(options) {
          const ads = getAdsApi();
          if (!ads) return { success: false, skipped: true, reason: "Ads API unavailable" };
          await piClient.ensureReady();
          const fn = ads.showAd || ads.show;
          if (typeof fn !== "function") {
            return { success: false, skipped: true, reason: "showAd not supported" };
          }
          try {
            const result = await Promise.resolve(fn.call(ads, options || {}));
            return { success: true, result };
          } catch (err) {
            console.warn("[Pi Ads]", err);
            return { success: false, error: err?.message || "Ad failed" };
          }
        },
      };
    }

    /** pi-sdk-js handleAuth — PiSdkBase.connect() 래퍼 */
    async function handleAuth(scopes) {
      return connectPi({ scopes: scopes || PI_AUTH_SCOPES_LOGIN });

    /** pi-sdk-react usePiConnection 동등 — { connected, user, accessToken, ready } */
    function usePiConnection() {
      return {
        get connected() {
          return getPiConnection().connected;
        },
        get user() {
          return getPiConnection().user;
        },
        get accessToken() {
          return getPiConnection().accessToken;
        },
        get ready() {
          return getPiConnection().ready;
        },
        connect: connectPi,
      };
    }

    window.usePiConnection = usePiConnection;

    window.getPiConnection = getPiConnection;
    window.connectPi = connectPi;
    window.handleAuth = handleAuth;
    window.usePiPurchase = usePiPurchase;
    window.usePiAds = usePiAds;
    window.subscribePiConnection = subscribePiConnection;
    window.onIncompletePayment = onIncompletePayment;

    /**
     * accessToken 서버 검증 — Pi Platform API /me (백엔드 경유)
     * 검증된 uid·username만 신뢰 (프론트 auth.user는 표시용)
     */
    async function verifyPiAccessToken(accessToken, retries) {
      const url = window.PI_AUTH_VERIFY_URL;
      if (!url || !accessToken) {
        throw new Error("서버 인증 URL 또는 accessToken이 없습니다.");
      }
      const attempts = Math.max(1, retries ?? 3);
      let lastError = null;
      for (let i = 0; i < attempts; i++) {
        try {
          const res = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json", Accept: "application/json" },
            body: JSON.stringify({
              accessToken,
              sandbox: isPiSandboxMode(),
            }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok || !data.success || !data.user?.uid) {
            const errMsg = data.error || `accessToken 서버 검증 실패 (${res.status})`;
            if ((res.status === 502 || res.status === 503) && i < attempts - 1) {
              await new Promise((r) => setTimeout(r, 2000 * (i + 1)));
              continue;
            }
            throw new Error(errMsg);
          }
          return {
            uid: data.user.uid,
            username: data.user.username || null,
          };
        } catch (err) {
          lastError = err;
          const msg = err?.message || "";
          const retryable =
            /failed to fetch|network|502|503|verification failed/i.test(msg) && i < attempts - 1;
          if (retryable) {
            await new Promise((r) => setTimeout(r, 2000 * (i + 1)));
            continue;
          }
          throw err;
        }
      }
      throw lastError || new Error("accessToken 서버 검증에 실패했습니다.");
    }

    function requiresPiAuth() {
      return isPiBrowserEnv();

    /** Pi Browser: KR CASH 세션 + 베팅 가능 시 플레이 / 일반 브라우저: 데모 허용 */

    const piPlayRow = document.getElementById("piPlayRow");

      updatePiUI(true);

      warmPiBackend().catch(() => {});

        messageEl.innerHTML = `Pi 인증 완료 · <strong>${name}</strong>님 환영합니다!${uidHint}`;

    async function handlePiLogin(silent) {

    async function initPiSdk() {
      if (initPiSdkPromise) return initPiSdkPromise;
      initPiSdkPromise = (async () => {
        syncPiSandboxSession();
        if (!PiClient.isBrowserReady()) {
          const loaded = await piClient.waitForGlobal(8000);
          if (!loaded) {
            piSdkReady = true;
            if (piPlayRow) piPlayRow.hidden = true;
            return;
          }
        }
        if (piPlayRow) piPlayRow.hidden = false;
        piService = new PiService();
        window.piService = piService;
        try {
          await piClient.ensureReady();
        } catch (err) {
          console.warn("initPiSdk:", err);
        }
        piSdkReady = true;
        syncPiConnectionState({ ready: true });
        if (PiClient.isBrowserReady()) {
          ensurePiBackendReady({ maxMs: 30000 }).catch(() => {});
        }
        const saved = loadPiSession();
        if (saved?.accessToken && piClient._initDone) {
          try {
            await piClient.ensureReady();
            const restoreScopes = PI_AUTH_SCOPES_LOGIN;
            const auth = await piClient.connect({
              scopes: restoreScopes,
              onIncompletePayment,
            });
            if (!auth?.accessToken) throw new Error("세션 복원 인증 실패");
            const verifiedUser = await verifyPiAccessToken(auth.accessToken);
            syncPiConnectionState({
              connected: true,
              user: verifiedUser,
              accessToken: auth.accessToken,
            });
            piService.accessToken = auth.accessToken;
            piService.user = verifiedUser;
            piService.paymentsScopeGranted = restoreScopes.includes("payments");
            lastPiAuthAt = Date.now();
            await piService.resolveIncompletePayment(auth.accessToken);
            savePiSession({
              accessToken: auth.accessToken,
              user: verifiedUser,
              paymentsScopeGranted: piService.paymentsScopeGranted,
              verifiedAt: Date.now(),
            });
            await onPiAuthenticated();
          } catch (err) {
            console.warn("Pi session re-verify failed:", err);
            clearPiSession();
            syncPiConnectionState({ connected: false, user: null, accessToken: null });
            updatePiUI(false);
          }
        } else {
          updatePiUI(false);
        }
      })();
      try {
        await initPiSdkPromise;
      } catch (err) {
        initPiSdkPromise = null;
        throw err;
      }
    }

    const Sfx = (() => {
      let ctx = null;
      let muted = false;
      let spinTimer = null;

      function ac() {
        if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
        return ctx;
      }

      function unlock() {
        const c = ac();
        if (c.state === "suspended") c.resume();
      }

      function tone(freq, dur, type = "square", vol = 0.12, when = 0) {
        if (muted) return;
        const c = ac();
        const t = c.currentTime + when;
        const o = c.createOscillator();
        const g = c.createGain();
        o.type = type;
        o.frequency.setValueAtTime(freq, t);
        g.gain.setValueAtTime(vol, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        o.connect(g);
        g.connect(c.destination);
        o.start(t);
        o.stop(t + dur);
      }

      function noise(dur, vol = 0.08) {
        if (muted) return;
        const c = ac();
        const buf = c.createBuffer(1, c.sampleRate * dur, c.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
        const src = c.createBufferSource();
        src.buffer = buf;
        const g = c.createGain();
        g.gain.value = vol;
        const f = c.createBiquadFilter();
        f.type = "bandpass";
        f.frequency.value = 800;
        src.connect(f);
        f.connect(g);
        g.connect(c.destination);
        src.start();
      }

      return {
        unlock,
        setMuted(m) { muted = m; if (m) this.stopSpinLoop(); },
        isMuted() { return muted; },

        click() {
          tone(520, 0.06, "sine", 0.1);
          tone(780, 0.05, "sine", 0.08, 0.04);
        },

        spinStart() {
          unlock();
          tone(220, 0.15, "sawtooth", 0.06);
          tone(330, 0.12, "square", 0.05, 0.05);
        },

        spinTick() {
          tone(180 + Math.random() * 80, 0.04, "square", 0.06);
        },

        startSpinLoop() {
          this.stopSpinLoop();
          let n = 0;
          spinTimer = setInterval(() => {
            if (muted) return;
            this.spinTick();
            n++;
            if (n % 4 === 0) noise(0.03, 0.04);
          }, 90);
        },

        stopSpinLoop() {
          if (spinTimer) clearInterval(spinTimer);
          spinTimer = null;
        },

        reelStop(i) {
          tone(120 + i * 40, 0.1, "triangle", 0.14);
          noise(0.06, 0.1);
          tone(90, 0.08, "sine", 0.1, 0.02);
        },

        winSmall() {
          [523, 659, 784, 1047].forEach((f, i) => tone(f, 0.12, "square", 0.1, i * 0.1));
        },

        winBig() {
          const notes = [392, 494, 587, 659, 784, 988, 1175];
          notes.forEach((f, i) => tone(f, 0.14, "square", 0.11, i * 0.09));
          setTimeout(() => {
            if (muted) return;
            [784, 988, 1175, 1568].forEach((f, i) => tone(f, 0.18, "sawtooth", 0.09, i * 0.12));
          }, 200);
          setTimeout(() => noise(0.15, 0.12), 100);
        },

        lose() {
          tone(200, 0.2, "sawtooth", 0.08);
          tone(150, 0.25, "triangle", 0.06, 0.15);
        },

        deposit() {
          [659, 784, 988, 1175].forEach((f, i) => tone(f, 0.1, "sine", 0.1, i * 0.07));
        },

        withdraw() {
          [784, 659, 523, 392].forEach((f, i) => tone(f, 0.1, "triangle", 0.09, i * 0.07));
        },
      };
    })();

    function getPronunciation(sym) {
      if (sym.type === "jamo") return JAMO_SPEAK[sym.char] || sym.char;
      return sym.speak || sym.label;
    }

    function delay(ms) {
      return new Promise((r) => setTimeout(r, ms));
    }

    function speakOnce(text) {
      return new Promise((resolve) => {
        if (!window.speechSynthesis) {
          resolve();
          return;
        }
        const u = new SpeechSynthesisUtterance(text);
        u.lang = "ko-KR";
        u.rate = 1.05;
        u.pitch = symPitch(text);
        const voices = speechSynthesis.getVoices();
        const ko = voices.find((v) => v.lang.startsWith("ko"));
        if (ko) u.voice = ko;
        u.onend = () => resolve();
        u.onerror = () => resolve();
        speechSynthesis.speak(u);
      });
    }

    function symPitch(text) {
      if (text.length > 4) return 1;
      if (text.includes("쌍") || text.includes("독도")) return 1.15;
      return 1.05;
    }

    async function pronounceNTimes(sym, times) {
      const text = getPronunciation(sym);
      const count = Math.max(1, times || PRONOUNCE_TIMES);
      speechSynthesis?.cancel();
      for (let i = 0; i < count; i++) {
        if (stopRequested) break;
        await speakOnce(text);
        if (stopRequested) break;
        await delay(180);
      }
    }

    async function pronounceFiveTimes(sym) {
      return pronounceNTimes(sym, PRONOUNCE_TIMES);

    function buildSymbolPool() {
      const pool = [];
      JAMO_GROUPS.forEach((group, gi) => {
        group.forEach((ch) => {
          pool.push({
            type: "jamo",
            char: ch,
            group: gi,
            speak: JAMO_SPEAK[ch] || ch,
            weight: group.length <= 2 ? 2 : 4,
          });
        });
      });
      SPECIALS.forEach((s) => {
        pool.push({ type: "special", ...s, weight: 1 });
      });
      return pool;
    }

    const SYMBOL_POOL = buildSymbolPool();

    function weightedPick() {
      const total = SYMBOL_POOL.reduce((a, s) => a + s.weight, 0);
      let r = Math.random() * total;
      for (const s of SYMBOL_POOL) {
        r -= s.weight;
        if (r <= 0) return s;
      }
      return SYMBOL_POOL[SYMBOL_POOL.length - 1];
    }

    function symbolKey(sym) {
      return sym.type === "jamo" ? `j:${sym.char}` : `s:${sym.id}`;
    }

    function renderSymbolEl(sym) {
      const div = document.createElement("div");
      div.className = "symbol " + sym.type;
      div.dataset.key = symbolKey(sym);
      if (sym.type === "jamo") {
        div.textContent = sym.char;
        div.dataset.group = String(sym.group);
        div.dataset.char = sym.char;
      } else {
        div.innerHTML = svgIcons[sym.id] + `<span class="sym-label">${sym.label}</span>`;
        div.dataset.special = sym.id;
        div.dataset.krPrize = String(sym.krPrize || PRIZE_KR_ISLAND);
      }
      return div;
    }

    function randomStrip(len) {
      const strip = [];
      for (let i = 0; i < len; i++) strip.push(weightedPick());
      return strip;
    }

    /** U2A 결제 완료 후 백엔드 스테이킹 API — KR CASH 세션 시작 */
    async function confirmStakeViaApi(piAmount, paymentId) {
      const base = getPiBackendBase();
      if (!base || !piAccessToken) {
        throw new Error("스테이킹 API를 사용할 수 없습니다.");
      }
      const res = await fetch(`${base}/api/pi/stake`, {
        method: "POST",
        headers: { "Content-Type": "application/json", Accept: "application/json" },
        body: JSON.stringify(
          piApiPayload({
            accessToken: piAccessToken,
            piAmount,
            paymentId: paymentId || null,
            rate: PI_TO_KR_RATE,
          })
        ),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.success || !data.stake) {
        throw new Error(data.error || "스테이킹 API 호출에 실패했습니다.");
      }
      return data.stake;
    }
