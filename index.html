    /**
     * π 스테이킹 — U2A 결제 + /api/pi/stake → KR CASH
     * @param {{ auto?: boolean }} options — auto: 로그인 직후 자동 스테이킹
     */
    async function stakePi(options = {}) {
      const auto = !!options.auto;
      if (spinning || autoMode || piPaymentBusy) {
        return { success: false, skipped: true };
      }
      if (!piClient.canPay()) {
        if (!auto) {
          messageEl.innerHTML = "π 스테이킹은 <strong>Pi Browser</strong>에서만 가능합니다.";
          messageEl.className = "message lose";
        }
        return { success: false, error: "not Pi Browser" };
      }
      const base = getPiBackendBase();
      if (!base) {
        if (!auto) {
          messageEl.innerHTML =
            "백엔드 URL이 설정되지 않았습니다. <code>PI_BACKEND_URL</code> 또는 <code>PI_AUTH_VERIFY_URL</code>을 설정해 주세요.";
          messageEl.className = "message lose";
        }
        return { success: false, error: "no backend" };
      }

      const { connected, accessToken } = getPiConnection();
      if (!connected || !accessToken) {
        if (!auto) {
          messageEl.innerHTML =
            "π 스테이킹은 <strong>Pi 로그인 (결제 권한 포함)</strong> 후 이용할 수 있습니다.";
          messageEl.className = "message lose";
        }
        return { success: false, error: "not connected" };
      }
      if (!isStakeDepositAllowed()) {
        if (!auto) {
          messageEl.innerHTML =
            `KR 세션 진행 중입니다. KR이 모두 소진된 뒤 <strong>π 스테이킹</strong>을 이용해 주세요. (보유 ${balance.toLocaleString("ko-KR")} KR)`;
          messageEl.className = "message lose";
        }
        return { success: false, skipped: true };
      }

      piPaymentBusy = true;
      updateControls();
      if (!auto) {
        Sfx.unlock();
        Sfx.click();
      }

      const piAmount = bankPiAmount;
      const krCredit = piToKr(piAmount);
      const sandbox = isPiSandboxMode();

      try {
        if (!auto) {
          messageEl.innerHTML =
            `서버 준비 중… <strong>${formatPi(piAmount)}</strong> · ${sandbox ? "테스트넷" : "메인넷"}`;
          messageEl.className = "message";
        }
        const serverReady = await ensurePiBackendReady({ maxMs: auto ? 20000 : 45000 });
        if (!serverReady) {
          throw new Error("백엔드 서버 준비 시간이 초과되었습니다. 30초 후 다시 시도해 주세요.");
        }
        startPaymentKeepAlive();

        if (!auto) {
          messageEl.innerHTML =
            `지갑에서 π 스테이킹을 확인해 주세요… <strong>${formatPi(piAmount)}</strong> → <strong>${krCredit.toLocaleString("ko-KR")} KR CASH</strong>`;
          messageEl.className = "message";
        }

        const pay = usePiPurchase({
          amount: piAmount,
          memo: `KRSLOT π 스테이킹 → ${krCredit.toLocaleString("ko-KR")} KR`,
          metadata: {
            type: "stake",
            piAmount,
            krAmount: krCredit,
            rate: PI_TO_KR_RATE,
            uid: piUser?.uid || null,
            username: piUser?.username || null,
          },
        });
        const paymentResult = await pay.pay();
        const paymentId =
          paymentResult?.identifier ||
          paymentResult?.payment?.identifier ||
          paymentResult?.paymentId ||
          null;

        const stake = await confirmStakeViaApi(piAmount, paymentId);
        applyStakeSession(stake);
        if (!auto) Sfx.deposit();
        if (!auto) {
          messageEl.innerHTML =
            `π 스테이킹 완료 · <strong>${formatPi(stake.piAmount)}</strong> → ` +
            `<strong>${balance.toLocaleString("ko-KR")} KR CASH</strong> — SPIN · AUTO · 베팅 변경 가능`;
          messageEl.className = "message win";
        }
        return { success: true, stake };
      } catch (err) {
        const msg = formatPiPaymentError(err);
        const cancelled = /취소|cancel/i.test(msg);
        if (!auto) {
          let hint = "";
          if (/payments.*scope|without.*payments|결제 권한/i.test(msg)) {
            hint =
              "<br><small><strong>Pi 로그인</strong> 팝업에서 username·payments(결제) 권한을 모두 허용한 뒤 다시 시도해 주세요.</small>";
          } else if (/승인 시간|timeout|만료|expired|approve/i.test(msg)) {
            hint =
              "<br><small>테스트넷: Pi.init sandbox=<strong>" +
              isPiSandboxMode() +
              "</strong> · Render <strong>PI_SANDBOX_API_KEY</strong>(Testnet) 확인. 입금 전 서버가 깨어 있도록 잠시 후 재시도하세요.</small>";
          } else if (cancelled) {
            hint = "<br><small>Pi Browser 결제 팝업에서 승인했는지 확인해 주세요.</small>";
          } else if (isPiSandboxMode() && /approve|api key|502|503|payment_not_found|stake/i.test(msg)) {
            hint =
              "<br><small>Render <strong>PI_SANDBOX_API_KEY</strong>(Developer Portal Testnet) 확인</small>";
          }
          messageEl.innerHTML = msg + hint;
          messageEl.className = "message lose";
          Sfx.lose();
        }
        console.warn("Pi stake:", err);
        return { success: false, error: msg, cancelled };
      } finally {
        stopPaymentKeepAlive();
        piPaymentBusy = false;
        updateControls();
      }
    }

    function initReels() {
      reelsEl.innerHTML = "";
      reelStrips = [];
      reelOffsets = [];
      for (let r = 0; r < REEL_COUNT; r++) {
        const stripLen = 24 + r * 4;
        const symbols = randomStrip(stripLen);
        reelStrips.push(symbols);
        reelOffsets.push(Math.floor(Math.random() * (stripLen - VISIBLE)));

        const reel = document.createElement("div");
        reel.className = "reel";
        reel.dataset.index = r;
        const stripEl = document.createElement("div");
        stripEl.className = "reel-strip";
        symbols.forEach((sym) => stripEl.appendChild(renderSymbolEl(sym)));
        reel.appendChild(stripEl);
        reelsEl.appendChild(reel);
      }
      syncSymbolHeight();
      for (let r = 0; r < REEL_COUNT; r++) positionReel(r, false);
    }

    function positionReel(reelIndex, animate, durationMs) {
      syncSymbolHeight();
      const reel = reelsEl.children[reelIndex];
      if (!reel) return 0;
      const strip = reel.querySelector(".reel-strip");
      if (!strip) return 0;
      const y = -reelOffsets[reelIndex] * SYMBOL_H;
      const dur = durationMs ?? SPIN_MS + reelIndex * 450;
      if (!animate) {
        strip.style.transition = "none";
        strip.style.transform = `translate3d(0, ${y}px, 0)`;
        return dur;
      }
      strip.style.transition = "none";
      void strip.offsetHeight;
      strip.style.transition = `transform ${dur}ms cubic-bezier(0.15, 0.85, 0.25, 1)`;
      strip.style.transform = `translate3d(0, ${y}px, 0)`;
      return dur;
    }

    /** 3×3 보이는 칸 [행][열] — 행0=위, 행1=가운데, 행2=아래 */
    function getVisibleGrid() {
      const grid = [];
      for (let row = 0; row < VISIBLE; row++) {
        const line = [];
        for (let col = 0; col < REEL_COUNT; col++) {
          line.push(reelStrips[col][reelOffsets[col] + row]);
        }
        grid.push(line);
      }
      return grid;
    }

    const PAYLINES = [
      { id: "middle", label: "가운데 줄", cells: [[0, 1], [1, 1], [2, 1]], minMatch: 3 },
      { id: "diagDown", label: "대각선 ↘", cells: [[0, 0], [1, 1], [2, 2]], minMatch: 2 },
      { id: "diagUp", label: "대각선 ↙", cells: [[0, 2], [1, 1], [2, 0]], minMatch: 2 },
    ];

    const ISLAND_IDS = ["ieodo", "dokdo", "baengnyeong", "gageo", "gyeokryeol"];

    function getSymbolKrPrize(sym) {
      if (sym.type === "special") {
        if (sym.id === "tugeobi") return PRIZE_KR_TUGEOBI;
        if (ISLAND_IDS.includes(sym.id)) return PRIZE_KR_ISLAND;
        return sym.krPrize || PRIZE_KR_ISLAND;
      }
      return PRIZE_KR_JAMO;
    }

    function calcSymbolPayout(sym, matchCount, lineLabel, segment) {
      const krPrize = getSymbolKrPrize(sym);
      const piPrize = krToPiAmount(krPrize);
      const seg = segment ? ` (${segment})` : "";
      const matchText = matchCount >= 3 ? "3칸" : "2칸";
      const pronounceTimes = matchCount >= 3 ? PRONOUNCE_TIMES : 2;

      if (sym.type === "special") {
        return {
          payout: krPrize,
          piAmount: piPrize,
          desc: `${lineLabel} ${matchText} ${sym.label}! · ${krPrize.toLocaleString("ko-KR")} KR (≈ ${formatPi(piPrize)})`,
          sym,
          pronounceTimes,
        };
      }
      return {
        payout: krPrize,
        piAmount: piPrize,
        desc: `${lineLabel} ${matchText} ${sym.char}! ${JAMO_SPEAK[sym.char] || ""}${seg} · ${krPrize.toLocaleString("ko-KR")} KR`,
        sym,
        pronounceTimes,
      };
    }

    /** 한 줄에서 앞 2칸·뒤 2칸·3칸 일치 검사 */
    function evaluatePayline(grid, line) {
      const syms = line.cells.map(([col, row]) => grid[row][col]);
      const keys = syms.map(symbolKey);

      if (keys.every((k) => k === keys[0])) {
        return calcSymbolPayout(syms[0], 3, line.label);
      }
      if (line.minMatch <= 2) {
        if (keys[0] === keys[1]) {
          return calcSymbolPayout(syms[0], 2, line.label, "앞 2칸");
        }
        if (keys[1] === keys[2]) {
          return calcSymbolPayout(syms[1], 2, line.label, "뒤 2칸");
        }
      }
      return null;
    }

    /** 가운데 3칸 + 대각선 2칸 이상 일치 시 최고 상금 반환 */
    function evaluateWin() {
      const grid = getVisibleGrid();
      const hits = PAYLINES.map((line) => evaluatePayline(grid, line)).filter(Boolean);
      if (!hits.length) {
        return { payout: 0, desc: "", sym: null, pronounceTimes: 0 };
      }
      hits.sort((a, b) => b.payout - a.payout);
      return hits[0];
    }

    async function spin() {
      Sfx.unlock();
      if (!isPlayAllowed()) {
        const blockMsg = getPlayBlockMessage();
        if (blockMsg) {
          messageEl.innerHTML = blockMsg;
          messageEl.className = "message lose";
        }
        if (autoMode) stopAuto(null);
        return;
      }
      if (spinning || balance < bet) {
        if (balance < bet) {
          messageEl.innerHTML = getPlayBlockMessage() || `${COIN} 잔액이 부족합니다. (보유 ${balance.toLocaleString("ko-KR")} ${COIN})`;
          messageEl.className = "message lose";
          Sfx.lose();
          if (autoMode) stopAuto(null);
        }
        return;
      }
      spinning = true;
      updateControls();
      try {
        speechSynthesis?.cancel();
        sessionKrBet += bet;
        balance -= bet;
        updateHud();
        Sfx.click();
        Sfx.spinStart();
        Sfx.startSpinLoop();
        messageEl.innerHTML = `베팅 −${bet.toLocaleString("ko-KR")} ${COIN} · 돌아가는 중…`;
        messageEl.className = "message";
        machineEl.classList.remove("winning");
        gameFrameEl.classList.remove("winning");

        const targets = [];
        for (let r = 0; r < REEL_COUNT; r++) {
          const extra = 10 + r * 4 + Math.floor(Math.random() * 6);
          const strip = reelStrips[r];
          const newSymbols = [];
          for (let i = 0; i < extra; i++) newSymbols.push(weightedPick());
          const reelEl = reelsEl.children[r];
          const stripEl = reelEl.querySelector(".reel-strip");
          newSymbols.forEach((sym) => stripEl.appendChild(renderSymbolEl(sym)));
          reelStrips[r] = strip.concat(newSymbols);
          const maxStart = reelStrips[r].length - VISIBLE - 1;
          const landing = Math.min(maxStart, reelOffsets[r] + extra);
          targets.push(landing);
        }

        await new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve)));

        let maxDur = 0;
        for (let r = 0; r < REEL_COUNT; r++) {
          reelOffsets[r] = targets[r];
          const dur = positionReel(r, true);
          maxDur = Math.max(maxDur, dur);
          const reelEl = reelsEl.children[r];
          setTimeout(() => {
            Sfx.reelStop(r);
            reelEl.classList.add("stopping");
            setTimeout(() => reelEl.classList.remove("stopping"), 300);
          }, dur - 40);
        }

        await delay(maxDur + 80);

        Sfx.stopSpinLoop();
        const { payout, piAmount, desc, sym, pronounceTimes } = evaluateWin();

        if (payout > 0) {
          sessionKrWon += payout;
          balance += payout;
          const pron = getPronunciation(sym);
          const times = pronounceTimes || PRONOUNCE_TIMES;
          machineEl.classList.add("winning");
          gameFrameEl.classList.add("winning");
          Sfx.winBig();
          setLastWin(payout);
          messageEl.innerHTML =
            `당첨! <strong>+${payout.toLocaleString("ko-KR")} ${COIN}</strong> — ${desc}<br>` +
            `<small>「${pron}」 발음 ${times}회 · STOP/게임 종료 시 π 지갑으로 환급 (보유 ${balance.toLocaleString("ko-KR")} ${COIN})</small>`;
          messageEl.className = "message win";

          if (!stopRequested) await pronounceNTimes(sym, times);
          if (stopRequested) speechSynthesis?.cancel();
        } else {
          setLastWin(0);
          messageEl.innerHTML = `당첨 없음 · 베팅 ${bet.toLocaleString("ko-KR")} ${COIN} 차감됨`;
          messageEl.className = "message lose";
          Sfx.lose();
        }
        updateHud();
      } catch (err) {
        console.error("spin error:", err);
        messageEl.innerHTML = "스핀 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.";
        messageEl.className = "message lose";
        Sfx.lose();
      } finally {
        spinning = false;
        updateControls();
      }

      await checkKrSessionEnd();

      if (stopRequested && !autoMode) {
        await onGameStopSettle();
      }

      if (autoMode && !stopRequested && isPlayAllowed()) scheduleNextAuto();
    }

    spinBtn.addEventListener("click", () => {
      stopRequested = false;
      if (!isPlayAllowed() || !canAffordSpin()) {
        const blockMsg = getPlayBlockMessage();
        if (blockMsg) {
          messageEl.innerHTML = blockMsg;
          messageEl.className = "message lose";
          Sfx.lose();
        }
        return;
      }
      spin();
    });

    autoBtn.addEventListener("click", startAuto);

    stopBtn.addEventListener("click", () => {
      if (!autoMode && !spinning) return;
      const wasAuto = autoMode;
      stopAuto(
        wasAuto ? "STOP — 자동 스핀을 중지했습니다." : "STOP — 진행 중인 동작을 중지했습니다."
      );
    });

    const soundToggle = document.getElementById("soundToggle");
    soundToggle.addEventListener("click", () => {
      Sfx.unlock();
      const next = !Sfx.isMuted();
      Sfx.setMuted(next);
      soundToggle.classList.toggle("muted", next);
      soundToggle.textContent = next ? "🔇 음소거" : "🔊 사운드";
      soundToggle.setAttribute("aria-pressed", String(next));
      if (!next) Sfx.click();
    });
    document.querySelectorAll(".bet-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        if (spinning || autoMode) return;
        document.querySelectorAll(".bet-btn").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        bet = Number(btn.dataset.bet);
        updateHud();
        updateControls();
      });
    });

    document.querySelectorAll(".bank-preset").forEach((btn) => {
      btn.addEventListener("click", () => {
        if (spinning || autoMode) return;
        document.querySelectorAll(".bank-preset").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        bankPiAmount = Number(btn.dataset.pi);
        updateControls();
        Sfx.click();
      });
    });

    depositBtn.addEventListener("click", depositPi);
    withdrawBtn.addEventListener("click", cashOutGamePi);
    freeBtn.addEventListener("click", claimFreeKr);
    piLoginBtn?.addEventListener("click", () => {
      handlePiLogin(false).catch((err) => {
        console.error("Pi login click:", err);
        messageEl.textContent = formatPiAuthError(err);
        messageEl.className = "message lose";
      });
    });

    function syncSymbolHeight() {
      const sym = document.querySelector(".symbol");
      if (!sym) return;
      const h = sym.getBoundingClientRect().height;
      if (h > 0) SYMBOL_H = h;
    }

    let resizeTimer;
    function onViewportChange() {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        syncSymbolHeight();
        for (let r = 0; r < REEL_COUNT; r++) positionReel(r, false);
      }, 120);
    }

    function bootGame() {
      try {
        initReels();
        setLastWin(0);
        updateHud();
        updateControls();
      } catch (err) {
        console.error("bootGame error:", err);
      }
    }

    bootGame();
    initPiSdk().catch((err) => console.warn("initPiSdk:", err));
    window.addEventListener("resize", onViewportChange);
    window.addEventListener("orientationchange", onViewportChange);
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", onViewportChange);
    }
  </script>
</body>
</html>
